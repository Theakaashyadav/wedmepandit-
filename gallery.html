<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
   <link rel="stylesheet" href="style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #fff6ed, #fde3c3);
}

/* Section */
.gallery-section {
  padding: 60px 8%;
  text-align: center;
}

.gallery-section h1 {
  font-size: 42px;
  color: #6b240c;
  margin-bottom: 40px;
  font-weight: 700;
}

/* Grid Layout */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  grid-auto-rows: 200px;
  gap: 18px;
}

/* Items */
.gallery-item {
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* Image */
.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.4s ease;
}

/* Hover Effect */
.gallery-item:hover img {
  transform: scale(1.1);
  filter: brightness(0.8);
}

/* Different Sizes (Pinterest Effect) */
.gallery-item.tall {
  grid-row: span 2;
}

.gallery-item.wide {
  grid-column: span 2;
}

/* Optional overlay */
.gallery-item::after {
  content: "View";
  position: absolute;
  bottom: 10px;
  left: 15px;
  color: #fff;
  font-weight: 600;
  opacity: 0;
  transition: 0.3s;
}

.gallery-item:hover::after {
  opacity: 1;
}

/* Responsive */
@media (max-width: 768px) {
  .gallery {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    grid-auto-rows: 150px;
  }

  .gallery-item.wide {
    grid-column: span 1;
  }
}
/* LIGHTBOX */
#lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: zoomIn 0.3s ease;
}

#lightbox .close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 35px;
  color: #fff;
  cursor: pointer;
}

/* animation */
@keyframes zoomIn {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
  </style>
</head>
<body>
<div id="header"></div>
  <section class="gallery-section">
    <h1>Gallery</h1>

    <div class="gallery">

      <div class="gallery-item"><img src="images/gallery/1.jpeg"></div>
<div class="gallery-item tall"><img src="images/gallery/2.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/3.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/4.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/5.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/6.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/7.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/8.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/9.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/10.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/11.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/12.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/13.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/14.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/15.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/16.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/17.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/18.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/19.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/20.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/21.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/22.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/23.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/24.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/25.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/26.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/27.jpeg"></div>
<div class="gallery-item"><img src="images/gallery/28.jpeg"></div>
    </div>
  </section>
  <div id="lightbox">
  <span class="close">&times;</span>
  <img id="lightbox-img">
</div>
<div id="footer"></div>
<script>
    // Load Header
    fetch("header.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("header").innerHTML = data;

        // Attach menu button after header loads
        const menuBtn = document.querySelector(".menu-btn");
        const navLinks = document.querySelector(".nav-links");

        if (menuBtn) {
          menuBtn.onclick = () => {
            navLinks.classList.toggle("show");
          };
        }
      });

    // Load Footer
    fetch("footer.html")
      .then(res => res.text())
      .then(data => document.getElementById("footer").innerHTML = data);

      const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const closeBtn = document.querySelector(".close");

// Open image
document.querySelectorAll(".gallery-item img").forEach(img => {
  img.addEventListener("click", () => {
    lightbox.style.display = "flex";
    lightboxImg.src = img.src;
  });
});

// Close button
closeBtn.onclick = () => {
  lightbox.style.display = "none";
};

// Close on background click
lightbox.onclick = (e) => {
  if (e.target !== lightboxImg) {
    lightbox.style.display = "none";
  }
};
</script>

</body>
</html>
