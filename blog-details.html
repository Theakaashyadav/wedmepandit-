<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Details</title>
  <link rel="stylesheet" href="style.css">
 <style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #fff6ed, #fde3c3);
  color: #2b1b12;
  min-height: 100vh;
}

/* Container */
.details-section {
  max-width: 900px;
  margin: 60px auto;
  padding: 35px;
  background: rgba(255, 255, 255, 0.95);
  border-radius: 25px;
  box-shadow: 0 20px 60px rgba(122, 46, 19, 0.2);
  animation: fadeIn 0.6s ease;
}

/* Back Button */
.back-btn {
  display: inline-block;
  margin-bottom: 25px;
  text-decoration: none;
  background: linear-gradient(135deg, #7a2e13, #f97316);
  color: #fff;
  padding: 12px 22px;
  border-radius: 50px;
  font-weight: 600;
  box-shadow: 0 10px 25px rgba(249, 115, 22, 0.3);
  transition: all 0.3s ease;
}

.back-btn:hover {
  transform: translateX(-6px);
  box-shadow: 0 15px 35px rgba(249, 115, 22, 0.45);
}

/* Image */
.details-img {
  width: 100%;
  height: 420px;
  object-fit: cover;
  border-radius: 20px;
  margin-bottom: 25px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.2);
  transition: 0.4s ease;
}

.details-img:hover {
  transform: scale(1.02);
}

/* Title */
.details-section h1 {
  font-size: 40px;
  font-weight: 700;
  color: #6b240c;
  margin-bottom: 15px;
  line-height: 1.3;
}

/* Decorative line */
.details-section h1::after {
  content: "";
  display: block;
  width: 80px;
  height: 4px;
  background: linear-gradient(90deg, #f97316, #7a2e13);
  margin-top: 10px;
  border-radius: 20px;
}

/* Content */
.details-section p {
  font-size: 18px;
  line-height: 1.9;
  color: #4b3328;
  margin-top: 15px;
  white-space: pre-line; /* ✅ makes \n line breaks work with textContent */
}

/* Animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Responsive */
@media (max-width: 768px) {
  .details-section {
    margin: 20px;
    padding: 20px;
  }

  .details-img {
    height: 250px;
  }

  .details-section h1 {
    font-size: 28px;
  }

  .details-section p {
    font-size: 16px;
  }
}
</style>
</head>
<body>
<div id="header"></div>
  <section class="details-section">
    <a href="blogs.html" class="back-btn">← Back</a>

    <img id="blogImage" class="details-img" src="" alt="Blog Image">
    <h1 id="blogTitle"></h1>
    <p id="blogContent"></p>
  </section>
<div id="footer"></div>
  <script >
    const blogs = {
  1: {
    title: "यज्ञ से पर्यावरण संरक्षण",
    image: "images/blog1.webp",
   content: `प्राचीन भारतीय संस्कृति में यज्ञ केवल धार्मिक अनुष्ठान नहीं, बल्कि प्रकृति के संरक्षण और संतुलन का एक महत्वपूर्ण माध्यम माना गया है। हमारे वेदों में यज्ञ को जीवन का आधार बताया गया है। यह न केवल आध्यात्मिक उन्नति का साधन है, बल्कि पर्यावरण को शुद्ध और संतुलित रखने में भी सहायक है।

यज्ञ के दौरान जो सामग्री (जैसे घी, हवन सामग्री, औषधीय जड़ी-बूटियाँ आदि) अग्नि में अर्पित की जाती हैं, उनसे निकलने वाला धुआँ वातावरण में फैलकर वायु को शुद्ध करता है। वैज्ञानिक दृष्टि से भी यह माना गया है कि यज्ञ से उत्पन्न धुआँ जीवाणुओं और हानिकारक सूक्ष्म जीवों को नष्ट करने में सहायक होता है। इससे वातावरण में शुद्धता और ताजगी बनी रहती है।

इसके अतिरिक्त, यज्ञ से उत्पन्न ऊर्जा और सकारात्मक तरंगें मानसिक शांति प्रदान करती हैं और वातावरण में सकारात्मकता का संचार करती हैं। यह मानव के साथ-साथ पशु-पक्षियों और वनस्पतियों के लिए भी लाभकारी होता है। यज्ञ में प्रयुक्त प्राकृतिक सामग्री पर्यावरण के अनुकूल होती है, जिससे किसी प्रकार का प्रदूषण नहीं होता।

आज के समय में जब वायु, जल और भूमि प्रदूषण तेजी से बढ़ रहे हैं, तब यज्ञ जैसी प्राचीन परंपराओं का महत्व और भी बढ़ जाता है। यदि हम नियमित रूप से यज्ञ करें और साथ ही वृक्षारोपण, जल संरक्षण जैसे कार्यों को भी अपनाएँ, तो पर्यावरण को संतुलित और सुरक्षित रखा जा सकता है।

अतः यह कहा जा सकता है कि यज्ञ केवल धार्मिक आस्था का प्रतीक नहीं, बल्कि पर्यावरण संरक्षण का एक प्रभावी और वैज्ञानिक उपाय भी है। हमें अपनी इस महान परंपरा को अपनाकर पर्यावरण की रक्षा में योगदान देना चाहिए। \n

जय प्रकाश शास्त्री
धर्माचार्य
𝐌𝐨. 𝟗𝟖𝟏𝟎𝟖𝟗𝟕𝟖𝟕𝟖`
  },
  2: {
    title: "Why Tiffin Service is Best for Students",
    image: "https://images.unsplash.com/photo-1543353071-873f17a7a088",
    content: "Tiffin service is a convenient and affordable option for students. It saves time, provides homemade food, and helps students focus more on their studies."
  },
  3: {
    title: "Benefits of Homemade Food",
    image: "https://images.unsplash.com/photo-1498837167922-ddd27525d352",
    content: "Homemade food is fresh, hygienic, and made with care. It is healthier than outside food and can be customized according to taste and diet needs."
  }
};

const params = new URLSearchParams(window.location.search);
const blogId = params.get("id");
const blog = blogs[blogId];

if (blog) {
  document.getElementById("blogImage").src = blog.image;
  document.getElementById("blogTitle").textContent = blog.title;
  document.getElementById("blogContent").textContent = blog.content;
}

// Load Header
    fetch("header.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("header").innerHTML = data;

        // Attach menu button after header loads
        const menuBtn = document.querySelector(".menu-btn");
        const navLinks = document.querySelector(".nav-links");

        if (menuBtn) {
          menuBtn.onclick = () => {
            navLinks.classList.toggle("show");
          };
        }
      });

    // Load Footer
    fetch("footer.html")
      .then(res => res.text())
      .then(data => document.getElementById("footer").innerHTML = data);
  </script>
</body>
</html>
