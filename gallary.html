<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
   <link rel="stylesheet" href="style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #fff6ed, #fde3c3);
}

/* Section */
.gallery-section {
  padding: 60px 8%;
  text-align: center;
}

.gallery-section h1 {
  font-size: 42px;
  color: #6b240c;
  margin-bottom: 40px;
  font-weight: 700;
}

/* Grid Layout */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  grid-auto-rows: 200px;
  gap: 18px;
}

/* Items */
.gallery-item {
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* Image */
.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.4s ease;
}

/* Hover Effect */
.gallery-item:hover img {
  transform: scale(1.1);
  filter: brightness(0.8);
}

/* Different Sizes (Pinterest Effect) */
.gallery-item.tall {
  grid-row: span 2;
}

.gallery-item.wide {
  grid-column: span 2;
}

/* Optional overlay */
.gallery-item::after {
  content: "View";
  position: absolute;
  bottom: 10px;
  left: 15px;
  color: #fff;
  font-weight: 600;
  opacity: 0;
  transition: 0.3s;
}

.gallery-item:hover::after {
  opacity: 1;
}

/* Responsive */
@media (max-width: 768px) {
  .gallery {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    grid-auto-rows: 150px;
  }

  .gallery-item.wide {
    grid-column: span 1;
  }
}
  </style>
</head>
<body>
<div id="header"></div>
  <section class="gallery-section">
    <h1>Our Food Gallery</h1>

    <div class="gallery">

      <div class="gallery-item"><img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836"></div>
      <div class="gallery-item tall"><img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe"></div>
      <div class="gallery-item"><img src="https://images.unsplash.com/photo-1498837167922-ddd27525d352"></div>
      <div class="gallery-item wide"><img src="https://images.unsplash.com/photo-1551218808-94e220e084d2"></div>
      <div class="gallery-item"><img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092"></div>
      <div class="gallery-item tall"><img src="https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445"></div>
      <div class="gallery-item"><img src="https://images.unsplash.com/photo-1605478371310-a9f1e96b4ff4"></div>
      <div class="gallery-item wide"><img src="https://images.unsplash.com/photo-1529042410759-befb1204b468"></div>

    </div>
  </section>
<div id="footer"></div>
<script>
    // Load Header
    fetch("header.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("header").innerHTML = data;

        // Attach menu button after header loads
        const menuBtn = document.querySelector(".menu-btn");
        const navLinks = document.querySelector(".nav-links");

        if (menuBtn) {
          menuBtn.onclick = () => {
            navLinks.classList.toggle("show");
          };
        }
      });

    // Load Footer
    fetch("footer.html")
      .then(res => res.text())
      .then(data => document.getElementById("footer").innerHTML = data);
</script>
</body>
</html>
