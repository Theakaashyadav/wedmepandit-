<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book | Wedmipandit</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #fff3e0, #ffe0b2);
}

/* HEADER */
.header {
    text-align: center;
    padding: 60px 20px;
    background: linear-gradient(45deg, #b22222, #ff6a00);
    color: white;
}

.header h1 {
    font-size: 40px;
}

/* FORM CONTAINER */
.container {
    max-width: 600px;
    margin: 40px auto;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 15px;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    cursor: pointer;
}

.book-btn {
    background: linear-gradient(45deg, #ff6a00, #ffb347);
    color: white;
}

.whatsapp-btn {
    background: #25D366;
    color: white;
}

.btn:hover {
    transform: scale(1.03);
}

/* NOTE */
.note {
    font-size: 13px;
    color: gray;
    margin-top: 10px;
    text-align: center;
}

</style>
</head>

<body>

<!-- HEADER -->
<section class="header">
    <h1>📅 Book Pandit Ji</h1>
    <p>Fill details & confirm your puja booking</p>
</section>

<!-- FORM -->
<div class="container">

<form id="bookingForm">

<input type="text" id="name" placeholder="Your Name" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<input type="date" id="date" required>

<input type="text" id="location" placeholder="Your Location" required>

<select id="puja">
    <option value="">Select Puja Type</option>
    <option>Wedding (Vivah Sanskar)</option>
    <option>Engagement</option>
    <option>Griha Pravesh</option>
    <option>Satyanarayan Katha</option>
    <option>Rudrabhishek</option>
    <option>Namkaran</option>
    <option>Mundan</option>
</select>

<button type="submit" class="btn book-btn">Submit Booking</button>

</form>

<button onclick="sendWhatsApp()" class="btn whatsapp-btn">
    📲 Book via WhatsApp
</button>

<p class="note">* We will confirm your booking shortly</p>

</div>

<script>

function sendWhatsApp() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let date = document.getElementById("date").value;
    let location = document.getElementById("location").value;
    let puja = document.getElementById("puja").value;

    let message = `New Booking Request:%0A
Name: ${name}%0A
Phone: ${phone}%0A
Date: ${date}%0A
Location: ${location}%0A
Puja: ${puja}`;

    let whatsappURL = `https://wa.me/919999999999?text=${message}`;

    window.open(whatsappURL, '_blank');
}

document.getElementById("bookingForm").addEventListener("submit", function(e){
    e.preventDefault();
    alert("Booking Submitted! We will contact you soon.");
});

</script>

</body>
</html>
