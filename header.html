<style>
    /* ---------- TOP BAR --------- */
.top-bar{

    display:flex;

}

}

.top-bar i:hover{

}

/* Mobile */

        font-size:12px;
        padding:6px 8px;
        gap:6px;
    }

    .top-bar i{
        margin-left:3px;
    }

    .top-bar span{
        font-size:12px;
    }
}
/* SOCIAL ICONS FIX */
.top-bar .social-links{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-top:0;
}

.top-bar .social-links a{
    width:34px;
    height:34px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    border-radius:50%;
    color:#fff;
    font-size:17px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.18);
    transition:0.3s ease;
}

.top-bar .social-links a i{
    margin:0;

}

.top-bar .social-links a:hover{

    color:#fff;
}

.top-bar .social-links a.instagram:hover{
    background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
}

.top-bar .social-links a.youtube:hover{
    background:#ff0000;
}

@media(max-width:600px){
    .top-bar .social-links a{
        width:28px;
        height:28px;
        font-size:14px;
    }
}
/* ---------- NAVBAR ---------- */
.navbar{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:6px 50px;
    background:var(--primary);
    box-shadow:0 5px 18px var(--shadow-light);
    position:sticky;
    top:0;
    z-index:1000;
}

.logo {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Logo Image Styling */
.logo img {
  height: 60px;            /* slightly bigger */
  width: auto;
  max-width: 250px;        /* increase width */
  object-fit: contain;

  border-radius: 12px;     /* 🔥 rounded corners */
  padding: 0px;            /* space inside */
  background: #fff;        /* clean background (optional) */

  transition: all 0.3s ease;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15));
}

/* Hover Effect (premium feel) */
.logo img:hover {
  transform: scale(1.06);
  border-radius: 16px;     /* slightly more rounded on hover */
  filter: drop-shadow(0 6px 14px rgba(0,0,0,0.25));
}

/* Sticky header adjustment */
header.scrolled .logo img {
  height: 52px;
}
/* Tablet */@media (max-width: 992px) {  .logo img {    height: 55px;    max-width: 220px;  }}/* Mobile */@media (max-width: 768px) {  .logo img {    height: 50px;    max-width: 190px;    border-radius: 10px;  }}/* Small Mobile */@media (max-width: 480px) {  .logo img {    height: 45px;    max-width: 160px;    border-radius: 8px;  }  .logo img:hover {    transform: scale(1.03);  }}/* Very Small Screens */@media (max-width: 360px) {  .logo img {    height: 40px;    max-width: 135px;  }}



/* NAV LINKS */
.nav-links{
    display:flex;
    align-items:center;
    gap:2px;
    z-index:2000;
}

.nav-links a{
    color:var(--white);
    text-decoration:none;
    font-size:16px;
    font-weight:600;
    padding:8px 14px;
    border-radius:10px;
    transition:all .35s ease;
}

.nav-links a:hover{
    background:var(--secondary);
    color:var(--white);
   box-shadow:0 6px 15px rgba(0,0,0,0.25);
    transform:translateY(-2px);
}

/* MENU BUTTON */
.menu-btn{
    display:none;
    font-size:30px;
    cursor:pointer;
    color:var(--secondary);
}

/* WHATSAPP BUTTON */
.whatsapp-btn{
    background:#25D366;
    color:#fff !important;
    font-weight:600;
    padding:8px 16px;
    border-radius:25px;
    margin-left:8px;
    display:flex;
    align-items:center;
    gap:6px;
    transition:0.3s ease;
}

/* ICON */
.whatsapp-btn i{
    font-size:16px;
}

/* HOVER */
.whatsapp-btn:hover{
    background:#1ebe5d;
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

/* MOBILE NAV */
@media(max-width:900px){

    .navbar{
        padding:12px 22px;
    }

    .menu-btn{
        display:block;
    }

    .nav-links{
        position:absolute;
        top:100%;
        right:-100%;
        width:100%;
        max-width:350px;
        background:var(--light);
        flex-direction:column;
        padding:12px 0; /* tightened */
        box-shadow:0 10px 30px var(--shadow-medium);
        transition:.45s;
        border-radius:0 0 16px 16px;
        overflow:hidden; /* 🔥 FIX: prevents hover spill */
    }

    .nav-links a{
        width:100%;
        padding:14px 22px;
        border-bottom:1px solid rgba(0,0,0,.07);
        color:var(--dark);
        display:block; /* 🔥 FIX */
    }

    .nav-links a:hover{
        background:var(--secondary);
        color:var(--dark);
        box-shadow:none;
        transform:none; /* 🔥 FIX: removes overlap cause */
    }

    .nav-links a.active{
        background:var(--secondary);
        color:var(--dark);
        font-weight:700;
    }

    .nav-links.show{
        right:0;
    }
    .whatsapp-btn{
    margin:10px 20px;
    justify-content:center;
}
}

/* MENU */
.menu{
    display:flex;
    gap:8px;
}

.menu li{
    position:relative;
}

/* MAIN LINKS */
.menu li a{
    color:var(--white);
    padding:12px 16px;
    display:flex;
    align-items:center;
    gap:6px;
    text-decoration:none;
    font-weight:600;
    font-size:16px;
    border-radius:8px; /* slightly reduced */
    transition:all .25s ease;
}

/* HOVER EFFECT */
.menu li a:hover{
    background:var(--secondary);
    color:var(--dark);
    transform:translateY(-1px); /* reduced movement */
}

/* SUBMENU */
.submenu{
    position:absolute;
    top:110%;
    left:0;
    background:var(--light);
    min-width:240px;
    display:none;
    border-radius:12px;
    box-shadow:0 12px 35px rgba(0,0,0,0.12);
    padding:6px 0; /* tighter spacing */
    z-index:999;
    opacity:0;
    transform:translateY(10px);
    transition:all .3s ease;
}

/* SHOW DROPDOWN */
.dropdown:hover > .submenu{
    display:block;
    opacity:1;
    transform:translateY(0);
}

/* SUBMENU LINKS */
.submenu li a{
    background:transparent;
    color:var(--dark);
    padding:10px 18px; /* 🔥 FIX: reduced height */
    font-size:15px;
    display:block; /* 🔥 FIX */
}

/* SUBMENU HOVER */
.submenu li a:hover{
    background:var(--secondary);
    color:var(--dark);
}

/* SUB-SUBMENU */
.sub-submenu{
    top:0;
    left:100%;
}

/* ---------- ARROWS ---------- */

.dropdown > a::after{
    content: "›";
    font-size:18px;
    font-weight:bold;
    margin-left:4px;
    transition:transform .3s ease;
}

.dropdown:hover > a::after{
    transform:rotate(90deg);
}

.submenu .dropdown > a{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.submenu .dropdown > a::after{
    content:"›";
    font-size:18px;
    font-weight:bold;
    transition:transform .3s ease;
}

.submenu .dropdown:hover > a::after{
    transform:translateX(4px);
}

/* REMOVE BULLETS */
ul, li {
    list-style: none;
    margin: 0;
    padding: 0;
}

.menu,
.submenu {
    list-style: none;
    margin: 0;
    padding: 0;
}

/* MOBILE FIX */
@media(max-width:900px){

    .menu{
        flex-direction:column;
        width:100%;
        gap:0; /* 🔥 FIX: removes stacking gap issues */
    }

    .submenu{
        position:relative;
        box-shadow:none;
        display:none;
        border-radius:0;
    }

    .submenu.show{
        display:block;
    }

    .sub-submenu{
        left:0;
    }
}

</style>

<script>
document.querySelectorAll('.dropdown > a').forEach(item => {
  item.addEventListener('click', function(e){

    if(window.innerWidth < 900){
        e.preventDefault();

        let submenu = this.nextElementSibling;

        // close others
        document.querySelectorAll('.submenu').forEach(el => {
            if(el !== submenu) el.classList.remove('show');
        });

        submenu.classList.toggle('show');
    }

  });
});
</script>
